<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aplikasi Pembuat Surat Desa</title>
<!-- Google Fonts: Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<!-- QRCode.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- jsPDF and html2canvas for Backup Feature -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  :root {
    --primary-dark: #0a4d2f;
    --primary: #0b5a3a;
    --primary-light: #7fc49b;
    --secondary: #f0f9f4;
    --background: #eef7f1;
    --surface: #ffffff;
    --text-primary: #212121;
    --text-secondary: #555555;
    --text-muted: #888888;
    --error: #d32f2f;
    --border: #e0e0e0;
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "Poppins", sans-serif;
    background-color: var(--background);
    color: var(--text-primary);
    line-height: 1.6;
  }

  .app {
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    width: 340px;
    background: linear-gradient(180deg, var(--primary-dark), var(--primary));
    color: var(--surface);
    padding: 25px;
    overflow-y: auto;
    box-shadow: var(--shadow);
  }

  .brand {
    font-weight: 700;
    font-size: 20px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar p.sub {
    opacity: 0.9;
    font-size: 13px;
    margin-bottom: 25px;
  }

  .menu {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 25px;
  }

  .menu .section-title {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.9;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  select, input, textarea {
    width: 100%;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
    background-color: var(--surface);
    color: var(--text-primary);
  }

  select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(127, 196, 155, 0.2);
  }
  
  .form-group {
    margin-bottom: 15px;
  }
  .form-group label {
    display: block;
    font-weight: 500;
    margin-bottom: 5px;
    font-size: 12px;
  }
  .form-group .error-message {
    color: var(--error);
    font-size: 12px;
    margin-top: 4px;
    display: none;
  }
  .form-group.has-error input,
  .form-group.has-error textarea,
  .form-group.has-error select {
    border-color: var(--error);
  }
  .form-group.has-error .error-message {
    display: block;
  }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
  }

  .panel {
    background: var(--surface);
    border-radius: 12px;
    padding: 25px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 60px);
  }

  .panel-header {
    display: flex;
    align-items: center;
    padding: 15px;
    background: var(--primary-light); /* Warna hijau terang */
    border-radius: 10px;
    margin-bottom: 20px;
    gap: 20px;
  }
  .panel h3 {
    margin: 0;
    color: var(--primary);
    font-weight: 600;
  }

  .preview-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    border: 0;
    font-weight: 500;
    font-size: 14px;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-prim {
    background: var(--primary);
    color: var(--surface);
  }
  .btn-prim:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }
  .btn:disabled {
    background: #cccccc;
    cursor: not-allowed;
    transform: none;
  }

  .btn-outline {
    background-color: #ffe066 !important;   /* kuning */
  border-color: #e6b800 !important;       /* kuning lebih gelap */
  color: #5a4a00 !important;              /* teks gelap */
  }
  .btn-outline:hover {
     background: rgba(211, 47, 47, 0.1) !important;  /* merah muda transparan */
  border-color: #b71c1c !important;               /* merah lebih gelap */
  color: #b71c1c !important;
  }
  .btn-danger {
    background: var(--error);
    color: var(--surface);
  }
  .btn-danger:hover {
    background: #b71c1c;
  }

  /* Form Container (Hidden by default) */
  #formContainer {
    background-color: var(--secondary);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--primary-light);
  }
  .hidden {
    display: none;
  }

  /* PREVIEW (kertas legal) */
  .preview-wrap {
    flex-grow: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .preview {
    background: #fdfdf8;
    width: 21.59cm;
    min-height: 35.56cm;
    margin: 0 auto;
    padding: 1.5cm 2.5cm 3cm 2.5cm;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    position: relative;
    text-align: left;
  }

  .preview::before { /* Watermark */
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-45deg);
    font-size: 100px;
    color: rgba(0, 0, 0, 0.05);
    font-weight: 700;
    white-space: nowrap;
    pointer-events: none;
  }

  .paper {
    font-family: "Times New Roman", Times, serif;
    font-size: 12pt;
    line-height: 1.6;
    color: #000;
    position: relative;
    z-index: 1;
  }

  .letterhead {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #000;
    padding-bottom: 15px;
  }
  .letterhead .logo-placeholder {
    width: 70px;
    height: 90px;
    background: #ddd;
    border-radius: 0%;
    margin-right: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    color: #777;
    overflow: hidden;
    flex-shrink: 0;
  }
  .letterhead .logo-placeholder img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .letterhead .letterhead-text {
    flex: 1;
    text-align: center;
  }
  .letterhead .letterhead-text p {
    margin: 2px 0;
    line-height: 1.2;
    font-weight: bold;
  }
  .letterhead h1 { margin: 0; font-size: 18px; font-weight: bold; }
  .letterhead p { margin: 2px 0; font-size: 11px; }

  .paper .center { text-align: center; }
  .paper .u { text-decoration: underline; }
  .paper .indent { text-indent: 50px; }
  .paper table.info { 
    margin-left: 50px; 
    margin-top: 10px; 
    margin-bottom: 20px; /* Tambahkan jarak 2 spasi setelah tabel */
    border-collapse: collapse; 
  }
  .paper table.info td { vertical-align: top; padding: 4px 8px; }
  .paper table.info td:first-child {white-space: nowrap; }
  
  /* Tambahkan jarak 2 spasi untuk paragraf setelah tabel */
  .paper .post-table-spacing {
    margin-bottom: 20px;
  }
  
  /* Tambahkan jarak 2 spasi untuk paragraf sebelum penutup */
  .paper .pre-closing-spacing {
    margin-top: 20px;
  }
  
  /* MODIFIKASI: Gaya TTD Baru untuk SKTM */
  .ttd-wrapper {
      margin-top: 50px;
      font-size: 11pt;
  }
  .ttd-row-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 40px;
  }
  .ttd-row-bottom {
      display: flex;
      justify-content: center;
  }
  .ttd-col {
      width: 45%;
      text-align: center;
  }
  .ttd-col-center {
      width: 50%;
      text-align: center;
  }
  .ttd-col p, .ttd-col-center p {
      margin: 0;
      line-height: 1.5;
  }
  .ttd-col .signature-space, .ttd-col-center .signature-space {
      height: 40px;
      margin-bottom: 5px;
      border-bottom: 1px solid black;
  }

  /* Hapus gaya lama agar tidak bentrok */
  .ttd-container, .ttd-box {
      /* display: none; */
  }

  #qrcode {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 70px;
    height: 70px;
  }
  #qrcode img { margin: 0; }

  /* Notification */
  .notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: var(--shadow-hover);
    z-index: 1000;
    animation: slideIn 0.3s ease-out;
  }
  
  @keyframes slideIn {
    from {
      transform: translateX(100%);
      opacity: 0;
    }
    to {
      transform: translateX(0);
      opacity: 1;
    }
  }

  /* Logo Upload */
  .logo-upload {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
  }
  .logo-preview {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .logo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .logo-upload-btn {
    padding: 8px 15px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.3s;
  }
  .logo-upload-btn:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  /* Responsive */
  @media (max-width: 1200px) {
    .sidebar { width: 280px; }
    .preview { transform: scale(0.8); transform-origin: top center; margin-bottom: -20%; }
  }
  @media (max-width: 1000px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; }
    .preview { transform: none; width: 100%; max-width: 500px; height: auto; margin: 0 auto; }
  }
  /* --- PERBAIKAN TANDA TANGAN --- */
.ttd-box {
    float: right;
    text-align: center;
    margin-top: 50px;
    width: 50%; /* Atur lebar sesuai kebutuhan */
}
/* --- PERBAIKAN JARAK TITIK DUA PADA TABEL --- */
.paper table.info td.titik-dua {
  width: 1px; /* Lebar minimal, padding yang akan mengatur jarak */
  padding: 0 10px; /* Memberi jarak 10px di kiri dan kanan titik dua */
  text-align: center; /* Menyelaraskan titik dua di tengah kolomnya */
}

/* --- JARAK SPASI UNTUK TABEL HIBAH --- */
.tabel-dengan-spasi {
  margin-top: 1em; /* Memberikan jarak 1 baris di atas tabel */
  margin-bottom: 1em; /* Memberikan jarak 1 baris di bawah tabel */
}
/* CSS untuk jarak titik dua pada tabel */
.paper table.info td:first-child {
  width: 25%; /* Lebar kolom label */
  padding-right: 5px; /* Mengurangi jarak kanan */
  white-space: nowrap; /* Mencegah teks label pindah baris */
}

.paper table.info td:nth-child(2) {
  width: 2%; /* Lebar kolom titik dua */
  padding: 0 5px; /* Mengurangi padding kiri dan kanan */
  text-align: center; /* Menyelaraskan titik dua di tengah */
}

.paper table.info td:nth-child(3) {
  width: 73%; /* Lebar kolom nilai */
  padding-left: 5px; /* Mengurangi jarak kiri */
}
/* CSS untuk Tabel Ahli Waris dengan Garis Tepi */
.tabel-ahli-waris {
  width: 100%;
  border-collapse: collapse; /* Menggabungkan garis border menjadi satu */
  margin-top: 10px;
  margin-bottom: 10px;
  font-size: 11pt; /* Ukuran font yang sesuai untuk surat */
}

.tabel-ahli-waris th,
.tabel-ahli-waris td {
  border: 1px solid #000; /* Garis hitam untuk semua sel */
  padding: 8px; /* Jarak antara teks dan garis */
  vertical-align: top; /* Sejajarkan teks ke atas */
}

.tabel-ahli-waris th {
  background-color: #f2f2f2; /* Warna latar belakang header (opsional) */
  text-align: center; /* Teks header di tengah */
  font-weight: bold;
}
.spasi-satu {
    margin-bottom: 1em; /* Memberikan jarak 1 baris di bawah paragraf */
    text-indent: 50px; /* Indentasi standar untuk paragraf */
    line-height: 1.6; /* Jarak antar baris dalam paragraf */
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
       <div class="menu">
      <div class="section-title">Identitas Desa</div>
      <div class="logo-upload">
        <div class="logo-preview" id="logoPreview">
          <i class="fas fa-image" style="color: #999;"></i>
        </div>
        <div>
          <input type="file" id="logoInput" accept="image/*" style="display: none;" onchange="handleLogoUpload(event)">
          <button class="logo-upload-btn" onclick="document.getElementById('logoInput').click()">
            <i class="fas fa-upload"></i> Upload Logo
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="desa_identitas">Nama Desa</label>
        <input id="desa_identitas" type="text" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label for="kecamatan_identitas">Kecamatan</label>
        <input id="kecamatan_identitas" type="text" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label for="kabupaten_identitas">Kabupaten</label>
        <input id="kabupaten_identitas" type="text" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label for="nama_kepala_identitas">Nama Kepala Desa</label>
        <input id="nama_kepala_identitas" type="text" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label for="nama_sekretaris_identitas">Nama Sekretaris Desa</label>
        <input id="nama_sekretaris_identitas" type="text" oninput="updatePreview()">
      </div>
      <button class="btn btn-prim" style="width: 100%; margin-top: 10px;" onclick="saveIdentitasDesa()">
        <i class="fas fa-save"></i> Simpan Identitas Desa
      </button>
    </div>

    
    <div class="menu">
      <div class="section-title">Penandatangan Surat</div>
      <div class="form-group">
        <label for="penandatangan">Pilih Penandatangan</label>
        <select id="penandatangan" onchange="updatePreview()">
          <option value="kepala_desa">Kepala Desa</option>
          <option value="sekretaris_desa">Sekretaris Desa (An. Kepala Desa)</option>
        </select>
      </div>
    </div>
  </aside>

  <main class="content">
    <div class="panel">
      <div class="panel-header">
   <div style="flex: 1;">
    <select id="jenisSurat" onchange="handleJenisSuratChange()" style="width: 360px; padding: 10px;">
      <option value="sttm">1. Surat Keterangan Tidak Mampu(401)</option>
	  <option value="sttm_a">2. SKTM Untuk Anak Sekolah(420)</option>
        <option value="sku">3. Surat Keterangan Usaha (SKU)(479)</option>
        <option value="domisili">4. Surat Domisili Penduduk (479)</option>
        <option value="dom_asset">5. Surat Domisili Asset (479)</option>
        <option value="kematian">6. Surat Keterangan Kematian (479)</option>
        <option value="ahli_waris">7. Surat Keterangan Ahli Waris</option>
        <option value="kelahiran">8. Surat Keterangan Kelahiran (479)</option>
        <option value="tanah">9. Surat Keterangan Tanah/Bangunan (343)</option>
        <option value="skck">10. Surat Pengantar Pembuatan SKCK (331)</option>
        <option value="beda_identitas">11. Surat Keterangan Beda Identitas (500)</option>
        <option value="ubah_data">12. Surat Perubahan Data (500)</option>
        <option value="janda_duda">13. Surat Keterangan Janda/Duda (500)</option>
        <option value="pengantar_umum">14. Surat Pengantar Umum</option>
        <option value="belum_menikah">15. Surat Keterangan Belum Menikah (560)</option>
        <option value="pengangkatan_anak">16. Surat Keterangan Pengangkatan Anak</option>
        <option value="hubungan_keluarga">17. Surat Keterangan Hubungan Keluarga</option>
        <option value="perwalian_anak">18. Surat Keterangan Perwalian Anak</option>
        <option value="penghasilan">19. Surat Keterangan Penghasilan</option>
        <option value="penerima_bantuan">20. Surat Keterangan Penerima Bantuan</option>
        <option value="keterangan_pekerjaan">21. Surat Keterangan Pekerjaan (474)</option>
        <option value="pindah_agama">22. Surat Keterangan Pindah Agama</option>
        <option value="pindah_masuk_keluar">23. Surat Keterangan Pindah Masuk/Keluar (474)</option>
		<option value="hibah">24. Surat Keterangan Hibah</option>
    </select>
  </div>

  <div class="preview-actions">
    <button class="btn btn-outline" onclick="toggleForm()">
      <i class="fas fa-edit"></i> <span id="toggleFormText">Buat Surat</span>
    </button>
    <button class="btn btn-prim" onclick="printPreview()">
      <i class="fas fa-print"></i> Cetak
    </button>
  </div>
</div>

      <div id="formContainer" class="hidden">
        <form id="suratForm">
          <!-- Common fields will be injected here by JS -->
        </form>
      </div>

      <div class="preview-wrap">
        <div id="preview" class="preview">
          <div class="paper" id="paperContent">
            <!-- Surat akan di-render di sini -->
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script>
// --- GLOBAL STATE & CONFIG ---
let currentLetterId = null;
let currentJenisSurat = 'sttm'; // Menyimpan jenis surat yang aktif
const IDENTITAS_KEY = 'identitasDesa';
let debounceTimer;
let logoDataUrl = null; // Menyimpan data URL logo

// --- DYNAMIC FORM TEMPLATES ---
const formTemplates = {
  sttm: `
    <fieldset style="border:1px solid var(--border); padding:15px; border-radius:8px; margin-bottom:20px;">
      <legend style="font-weight:600; padding:0 10px; color:var(--primary);">Identitas Pemohon</legend>
      <div class="row" style="display:flex; gap:16px;">
        <div class="col" style="flex:1;">
          <div class="form-group">
            <label for="nama">Nama Lengkap *</label>
            <input id="nama" type="text" oninput="debounceUpdate()" required>
            <span class="error-message">Nama harus diisi.</span>
          </div>
        </div>
        <div class="col" style="flex:1;">
          <div class="form-group">
            <label for="nik">NIK *</label>
            <input id="nik" type="text" oninput="debounceUpdate()" required>
            <span class="error-message">NIK harus diisi.</span>
          </div>
        </div>
      </div>
      <div class="row" style="display:flex; gap:16px;">
        <div class="col" style="flex:1;">
          <div class="form-group">
            <label for="ttl">Tempat / Tanggal Lahir *</label>
            <input id="ttl" type="text" oninput="debounceUpdate()" required>
            <span class="error-message">Tempat/Tanggal lahir harus diisi.</span>
          </div>
        </div>
        <div class="col" style="flex:1;">
          <div class="form-group">
            <label for="pekerjaan">Pekerjaan *</label>
            <input id="pekerjaan" type="text" oninput="debounceUpdate()" required>
            <span class="error-message">Pekerjaan harus diisi.</span>
          </div>
        </div>
      </div>
    </fieldset>
    <fieldset style="border:1px solid var(--border); padding:15px; border-radius:8px; margin-bottom:20px;">
      <legend style="font-weight:600; padding:0 10px; color:var(--primary);">Alamat</legend>
      
      <div class="row" style="display:flex; gap:16px;">
        <div class="col" style="flex:1;">
          <div class="form-group"><label for="rt">RT *</label><input id="rt" type="text" oninput="debounceUpdate()" required><span class="error-message">RT harus diisi.</span></div>
        </div>
        <div class="col" style="flex:1;">
          <div class="form-group"><label for="rw">RW *</label><input id="rw" type="text" oninput="debounceUpdate()" required><span class="error-message">RW harus diisi.</span></div>
        </div>
        <div class="col" style="flex:1;">
        <div class="form-group"><label for="dusun">Dusun *</label><input id="dusun" type="text" oninput="debounceUpdate()" required><span class="error-message">Dusun harus diisi.</span></div>
        </div>
       
      </div>
  
<fieldset style="border:1px solid var(--border); padding:15px; border-radius:8px; margin-bottom:20px;">
  <legend style="font-weight:600; padding:0 10px; color:var(--primary);">Keperluan</legend>
  <div class="form-group">
    <label for="keperluan">Keperluan Pembuatan Surat *</label>
    <textarea id="keperluan" rows="2" placeholder="Tuliskan keperluan pembuatan surat di sini..." oninput="debounceUpdate()" required></textarea>
    <span class="error-message">Keperluan harus diisi.</span>
  </div>
  <div class="form-group">

function validateForm() {
  let isValid = true;
  const requiredFields = document.querySelectorAll('#suratForm [required]');
  
  requiredFields.forEach(field => {
    const formGroup = field.closest('.form-group');
    if (!field.value.trim()) {
      formGroup.classList.add('has-error');
      isValid = false;
    } else {
      formGroup.classList.remove('has-error');
    }
  });
  return isValid;
}

function clearValidationErrors() {
  document.querySelectorAll('.form-group.has-error').forEach(el => el.classList.remove('has-error'));
}

// --- CORE LOGIC ---
function toggleForm() {
  const formContainer = document.getElementById('formContainer');
  const toggleText = document.getElementById('toggleFormText');
  formContainer.classList.toggle('hidden');
  if (formContainer.classList.contains('hidden')) {
    toggleText.textContent = 'Isi Data Surat';
  } else {
    toggleText.textContent = 'Tutup Form';
  }
}

function renderForm(jenis) {
  const formContainer = document.getElementById('suratForm');
  const commonFieldsHtml = `
    <div class="row" style="display:flex; gap:16px; margin-bottom:20px;">
      <div class="col" style="flex:1;">
        <div class="form-group">
          <label for="nomorSurat">Nomor Surat</label>
          <input id="nomorSurat" type="text" placeholder="Contoh: 001/DES/2023" oninput="debounceUpdate()">
        </div>
      </div>
      <div class="col" style="flex:1;">
        <div class="form-group">
          <label for="tanggal">Tanggal Surat</label>
          <input id="tanggal" type="text" placeholder="Contoh: 25 Oktober 2023" oninput="debounceUpdate()">
        </div>
      </div>
    </div>
  `;
  const specificFieldsHtml = formTemplates[jenis] || '';
  formContainer.innerHTML = commonFieldsHtml + specificFieldsHtml;
}

function handleJenisSuratChange() {
  currentJenisSurat = document.getElementById('jenisSurat').value;
  renderForm(currentJenisSurat);
  updatePreview();
}

function handleLogoUpload(event) {
  const file = event.target.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      logoDataUrl = e.target.result;
      const logoPreview = document.getElementById('logoPreview');
      logoPreview.innerHTML = `<img src="${logoDataUrl}" alt="Logo">`;
      updatePreview();
    };
    reader.readAsDataURL(file);
  } else {
    alert('Silakan pilih file gambar yang valid (JPG, PNG, dll.)');
  }
}

function updatePreview() {
  const data = getAllData();
  if (!currentLetterId) {
    currentLetterId = Date.now();
  }
  data.id = currentLetterId;
  data.createdAt = new Date().toISOString();
  data.logoDataUrl = logoDataUrl;

  const html = templates[currentJenisSurat](data);
  
  const paper = document.getElementById('paperContent');
  if (paper) {
    paper.innerHTML = html;
  } else {
    console.error("Elemen #paperContent tidak ditemukan!");
  }
}

function debounceUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(updatePreview, 300);
}

function showNotification(message) {
  const notif = document.createElement('div');
  notif.className = 'notification';
  notif.textContent = message;
  document.body.appendChild(notif);
  setTimeout(() => notif.remove(), 3000);
}

// --- IDENTITAS DESA FUNCTIONS ---
function saveIdentitasDesa() {
  const identitas = {
    desa: document.getElementById('desa_identitas').value,
    kecamatan: document.getElementById('kecamatan_identitas').value,
    kabupaten: document.getElementById('kabupaten_identitas').value,
    nama_kepala: document.getElementById('nama_kepala_identitas').value,
    nama_sekretaris: document.getElementById('nama_sekretaris_identitas').value,
    logo: logoDataUrl
  };
  localStorage.setItem(IDENTITAS_KEY, JSON.stringify(identitas));
  showNotification('Identitas Desa berhasil disimpan!');
  updatePreview();
}

function loadIdentitasDesa() {
  const identitas = JSON.parse(localStorage.getItem(IDENTITAS_KEY) || '{}');
  if (identitas.desa) {
    document.getElementById('desa_identitas').value = identitas.desa;
    document.getElementById('kecamatan_identitas').value = identitas.kecamatan;
    document.getElementById('kabupaten_identitas').value = identitas.kabupaten;
    document.getElementById('nama_kepala_identitas').value = identitas.nama_kepala;
    document.getElementById('nama_sekretaris_identitas').value = identitas.nama_sekretaris || '';
    if (identitas.logo) {
      logoDataUrl = identitas.logo;
      const logoPreview = document.getElementById('logoPreview');
      logoPreview.innerHTML = `<img src="${logoDataUrl}" alt="Logo">`;
    }
  }
}

// --- PRINT FUNCTION ---
function printPreview() {
  const printContents = document.getElementById('preview').innerHTML;
  const pageStyles = document.querySelector('style').innerHTML;

  const w = window.open('', '_blank', 'width=1000,height=800');
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Cetak Surat</title>');
  w.document.write(`<style>${pageStyles}</style>`);
  w.document.write('</head><body style="margin:0;">');
  w.document.write(printContents);
  w.document.write('</body></html>');
  
  w.document.close();
  w.focus();
  setTimeout(() => {
    w.print();
    w.close();
  }, 500);
}
